<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Products — Arcadia Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="dashboard.css" rel="stylesheet"/>
</head>
<body>

  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
  <button class="hamburger" id="hamburgerBtn" onclick="openSidebar()">
    <i class="bi bi-list"></i>
  </button>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-avatar"><i class="bi bi-stars"></i></div>
      <div class="brand-text">
        <div class="name">Arcadia Admin</div>
        <div class="sub">Control Panel</div>
      </div>
      <button class="sidebar-close" onclick="closeSidebar()"><i class="bi bi-x-lg"></i></button>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item" href="index.html"><i class="bi bi-grid-1x2"></i> Dashboard</a>
      <a class="nav-item active" href="adminproducts.html">
        <i class="bi bi-box-seam"></i> Products
        <i class="bi bi-chevron-right chevron"></i>
      </a>
      <a class="nav-item" href="admininventory.html"><i class="bi bi-archive"></i> Inventory</a>
      <a class="nav-item" href="adminorders.html"><i class="bi bi-receipt"></i> Orders</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-row">
        <div class="user-avatar">A</div>
        <div><div class="user-name">Admin User</div><div class="user-role">Administrator</div></div>
      </div>
      <a class="logout-btn" href="#" onclick="alert('Logout functionality coming soon.');return false;">
        <i class="bi bi-box-arrow-left"></i> Logout
      </a>
    </div>
  </aside>

  <main class="main">
    <div class="page-header">
      <div>
        <div class="page-title">Product Management</div>
        <div class="page-sub" id="productCount">Loading...</div>
      </div>
      <button class="btn-add" onclick="openAddModal()"><i class="bi bi-plus"></i> Add Product</button>
    </div>

    <div class="filter-bar">
      <div class="search-box">
        <i class="bi bi-search"></i>
        <input type="text" id="searchInput" placeholder="Search products..." oninput="filterProducts()"/>
      </div>
      <div class="cat-filters" id="catFilters">
        <button class="filter-btn active" onclick="filterCat(this,'All')">All</button>
      </div>
    </div>

    <div class="table-card">
      <div class="table-head">
        <div>Product</div><div>Category</div><div>Price</div><div>Stock</div><div>Rating</div><div>Actions</div>
      </div>
      <div id="productList"><div class="loading-text">Loading products...</div></div>
    </div>
  </main>

  <!-- ADD / EDIT MODAL -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
      <div class="modal-title" id="modalTitle">Add New Product</div>
      <div class="form-group"><label>Product Name</label><input type="text" id="fName" placeholder="e.g. Catan Base Game"/></div>
      <div class="form-row">
        <div class="form-group"><label>Category</label><select id="fCat"></select></div>
        <div class="form-group"><label>Badge</label>
          <select id="fBadge">
            <option value="">None</option><option value="Best Seller">Best Seller</option>
            <option value="New">New</option><option value="Sale">Sale</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Price (₱)</label><input type="number" id="fPrice" placeholder="1299"/></div>
        <div class="form-group"><label>Stock (units)</label><input type="number" id="fStock" placeholder="15"/></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Rating (0–5)</label><input type="number" id="fRating" placeholder="4.8" step="0.1" min="0" max="5"/></div>
        <div class="form-group"><label>Review Count</label><input type="number" id="fReviews" placeholder="234"/></div>
      </div>
      <div class="form-group"><label>Emoji / Icon</label><input type="text" id="fEmoji" placeholder="🎲"/></div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-save" onclick="saveProduct()">Save Product</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
