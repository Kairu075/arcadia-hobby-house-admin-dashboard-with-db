<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inventory — Arcadia Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="dashboard.css" rel="stylesheet"/>
</head>
<body>

  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
  <button class="hamburger" id="hamburgerBtn" onclick="openSidebar()">
    <i class="bi bi-list"></i>
  </button>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-avatar"><i class="bi bi-stars"></i></div>
      <div class="brand-text">
        <div class="name">Arcadia Admin</div>
        <div class="sub">Control Panel</div>
      </div>
      <button class="sidebar-close" onclick="closeSidebar()"><i class="bi bi-x-lg"></i></button>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item" href="index.html"><i class="bi bi-grid-1x2"></i> Dashboard</a>
      <a class="nav-item" href="adminproducts.html"><i class="bi bi-box-seam"></i> Products</a>
      <a class="nav-item active" href="admininventory.html">
        <i class="bi bi-archive"></i> Inventory
        <i class="bi bi-chevron-right chevron"></i>
      </a>
      <a class="nav-item" href="adminorders.html"><i class="bi bi-receipt"></i> Orders</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-row">
        <div class="user-avatar">A</div>
        <div><div class="user-name">Admin User</div><div class="user-role">Administrator</div></div>
      </div>
      <a class="logout-btn" href="#" onclick="alert('Logout functionality coming soon.');return false;">
        <i class="bi bi-box-arrow-left"></i> Logout
      </a>
    </div>
  </aside>

  <main class="main">
    <div class="top-bar">
      <div>
        <div class="page-title">Inventory Management</div>
        <div class="page-sub">Monitor and update stock levels</div>
      </div>
      <button class="btn-restock" onclick="restockAll()"><i class="bi bi-arrow-clockwise"></i> Restock Low Items</button>
    </div>

    <div class="stats-row" id="invStats" style="grid-template-columns:repeat(4,1fr);"></div>

    <div class="alert-banner">
      <i class="bi bi-exclamation-triangle-fill"></i>
      <div>
        <div class="a-title">Stock Alert</div>
        <div class="a-text" id="alertText">Loading...</div>
      </div>
    </div>

    <div class="filter-bar">
      <div class="search-box">
        <i class="bi bi-search"></i>
        <input type="text" id="invSearch" placeholder="Search by product name or category..." oninput="renderInventory()"/>
      </div>
      <button class="filter-btn active" id="btn-All Products"  onclick="setInvFilter('All Products')">All Products</button>
      <button class="filter-btn"        id="btn-Low Stock"     onclick="setInvFilter('Low Stock')">Low Stock</button>
      <button class="filter-btn"        id="btn-Out of Stock"  onclick="setInvFilter('Out of Stock')">Out of Stock</button>
    </div>

    <div class="table-card">
      <div class="table-head-inv">
        <div>Product</div><div>Category</div><div>Current Stock</div><div>Stock Level</div><div>Status</div><div>Actions</div>
      </div>
      <div id="invList"><div class="loading-text">Loading inventory...</div></div>
    </div>
  </main>

  <!-- UPDATE MODAL -->
  <div class="modal-overlay" id="invModalOverlay">
    <div class="modal-box">
      <div class="modal-title" id="invModalTitle">Update Stock</div>
      <div class="form-group">
        <label>New Stock Quantity</label>
        <input type="number" id="invFStock" placeholder="Enter new quantity" min="0"/>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeInvModal()">Cancel</button>
        <button class="btn-save"   onclick="saveStock()">Update Stock</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
